<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Спасибо за заявку</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Arial, sans-serif;
      background: #f7f8fb;
      color: #1f2329;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      max-width: 500px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }

    p {
      margin: 0 0 20px;
      font-size: 15px;
      color: #6b7280;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      background: #3b82f6;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
    }

    .btn:hover {
      background: #2563eb;
    }

    .hero-icon {
      width: 120px;
      height: 120px;
      margin: 0 0 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Мультяшный монтажник (один) -->
    <svg class="hero-icon" viewBox="0 0 120 120" fill="none">
      <!-- Фон круга -->
      <circle cx="60" cy="60" r="50" fill="#eef2f5"/>
      <!-- Кепка -->
      <path d="M30 45c0-12 10-22 24-22h24c14 0 24 10 24 22v6h-72v-6z" fill="#3b82f6"/>
      <rect x="42" y="23" width="24" height="22" fill="#2563eb"/>
      <!-- Лицо -->
      <circle cx="60" cy="58" r="18" fill="#f5d0b0"/>
      <!-- Глаза -->
      <circle cx="52" cy="52" r="3" fill="#1f2329"/>
      <circle cx="68" cy="52" r="3" fill="#1f2329"/>
      <!-- Брови -->
      <path d="M48 48c2-2 6-2 8 0" stroke="#1f2329" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M64 48c2-2 6-2 8 0" stroke="#1f2329" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Нос -->
      <path d="M58 58c2 0 4 2 4 4s-2 3-4 3-4-1-4-3 2-4 4-4z" fill="#e0c0a0"/>
      <!-- Рот (улыбка) -->
      <path d="M52 64c2 3 8 3 10 0" stroke="#1f2329" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Тело -->
      <rect x="38" y="80" width="44" height="30" rx="8" fill="#3b82f6"/>
      <!-- Рубашка/ворот -->
      <path d="M50 80c4 4 8 4 12 0" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
      <!-- Рука с инструментом -->
      <path d="M82 84c6-2 10 1 12 5s-2 8-10 6" stroke="#f5d0b0" stroke-width="10" stroke-linecap="round"/>
      <rect x="88" y="82" width="14" height="6" fill="#1f2329"/>
      <!-- Ноги -->
      <rect x="42" y="110" width="12" height="10" rx="4" fill="#1f2329"/>
      <rect x="66" y="110" width="12" height="10" rx="4" fill="#1f2329"/>
    </svg>

    <h1>Спасибо за вашу заявку!</h1>
    <p>
      Мы свяжемся с вами в ближайшее время.
    </p>
    <!-- Важно: полная ссылка на твой сайт -->
    <a class="btn" href="https://metalltale.github.io/potolkikmv/">Назад на сайт</a>
  </div>
</body>
</html>
