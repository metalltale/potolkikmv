<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Спасибо за заявку</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Arial, sans-serif;
      background: #f7f8fb;
      color: #1f2329;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      max-width: 500px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }

    p {
      margin: 0 0 20px;
      font-size: 15px;
      color: #6b7280;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      background: #3b82f6;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
    }

    .btn:hover {
      background: #2563eb;
    }

    .installer-svg {
      width: 120px;
      height: 120px;
      margin: 0 0 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Более человечный SVG монтажника -->
    <svg class="installer-svg" viewBox="0 0 120 120" fill="none">
      <!-- Фон -->
      <circle cx="60" cy="60" r="50" fill="#eef2f5"/>
      <!-- Кепка -->
      <path d="M35 48c0-10 8-18 18-18h24c10 0 18 8 18 18v4h-60v-4z" fill="#3b82f6"/>
      <rect x="48" y="30" width="24" height="18" fill="#2563eb"/>
      <!-- Лицо -->
      <circle cx="60" cy="58" r="16" fill="#f5d0b0"/>
      <!-- Глаза -->
      <circle cx="54" cy="54" r="2" fill="#1f2329"/>
      <circle cx="66" cy="54" r="2" fill="#1f2329"/>
      <!-- Нос -->
      <path d="M58 58c1 0 2 2 2 4s-1 2-2 2-2-0-2-2 1-4 2-4z" fill="#e0c0a0"/>
      <!-- Рот -->
      <path d="M54 64c2 2 4 2 6 0" stroke="#1f2329" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Тело -->
      <rect x="40" y="76" width="40" height="30" rx="8" fill="#3b82f6"/>
      <!-- Рука с инструментом -->
      <path d="M80 80c8-2 14 2 16 8s-2 12-14 10" stroke="#f5d0b0" stroke-width="10" stroke-linecap="round"/>
      <rect x="92" y="78" width="14" height="6" fill="#1f2329"/>
      <!-- Ноги -->
      <rect x="44" y="106" width="12" height="14" rx="4" fill="#1f2329"/>
      <rect x="64" y="106" width="12" height="14" rx="4" fill="#1f2329"/>
    </svg>

    <h1>Спасибо за вашу заявку!</h1>
    <p>
      Мы свяжемся с вами в ближайшее время.
    </p>
    <!-- Важно: полная ссылка на твой сайт -->
    <a class="btn" href="https://metalltale.github.io/potolkikmv/">Назад на сайт</a>
  </div>
</body>
</html>
